<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <!-- Arrow icons -->
    <img
      class="arrow-tag arrow-left"
      src="./assets/images/icons/arrow-sm-right-p-d.svg"
      alt="arrow"
      width="44"
      height="44"
    />
    <img
      class="arrow-tag"
      src="./assets/images/icons/arrow-sm-right-p-d.svg"
      alt="arrow"
      width="44"
      height="44"
    />
    <!-- Plus Icon -->
    <img
      class="arrow-tag"
      src="./assets/images/icons/plus.svg"
      alt="arrow"
      width="28"
      height="28"
    />
    <!-- Minus Icon -->
    <img
      class="arrow-tag"
      src="./assets/images/icons/minus.svg"
      alt="arrow"
      width="28"
      height="28"
    />

    <!-- social componant version-1 -->
    <!-- mail -->
    <a
      href="mailto:middleeastco.eg@hotmail.com"
      class="social-componant social-componant-v1 social-link"
    >
      <img
        src="./assets/images/icons/mail-sq-solid.svg"
        alt="arrow"
        width="28"
        height="28"
      />
      <p>email@mail.com</p>
    </a>
    <!-- phone -->
    <a
      href="tel:+20 111 494 9181"
      class="social-componant social-componant-v1 social-link"
    >
      <img
        src="./assets/images/icons/phone-sq-solid.svg"
        alt="arrow"
        width="28"
        height="28"
      />
      <p>+123 456 7890</p>
    </a>

    <!-- social link version 2 -->
    <div class="social-componant social-componant-v2">
      <img
        src="./assets/images/icons/phone.svg"
        alt="arrow"
        width="28"
        height="28"
      />
      <a href="tel:+123 456 7890" class="social-link">
        <strong>Phone Number</strong>
        <p>+123 456 7890</p>
      </a>
    </div>

    <!-- Lang button -->
    <button class="lang-button" id="btn-en">EN</button>
    <button class="lang-button" id="btn-ar">AR</button>

    <!-- Buttons -->
    <!-- primary button yellow -->
    <button class="button button-primary-yellow">
      GET A Quote
      <img
        src="./assets/images/icons/arrow-sq-up-right.svg"
        alt="arrow"
        width="32"
        height="32"
        class="rtl"
      />
    </button>
    <button class="button button-primary-yellow button-small">
        GET A Quote
        <img
        src="./assets/images/icons/arrow-sq-up-right.svg"
        alt="arrow"
        width="20"
        height="20"
        class="rtl"
      />
    </button>
    <!-- primary button light -->
    <button class="button button-primary-light">
      GET A Quote
      <img
        src="./assets/images/icons/arrow-sq-right.svg"
        alt="arrow"
        width="32"
        height="32"
        class="rtl"
      />
    </button>
    <button class="button button-primary-light button-small">
        GET A Quote
        <img
        src="./assets/images/icons/arrow-sq-right.svg"
        alt="arrow"
        width="20"
        height="20"
        class="rtl"
        />
    </button>
    
    <!-- Button Secondary -->
    <button class="button button-Secondary">
        <div class="btn-s-text">
            <strong>Project Title</strong>
            <div class="btn-text">Description</div>
        </div>
      <img
        src="./assets/images/icons/arrow-square-up-right-y.svg"
        alt="arrow"
        width="40"
        height="40"
        class="rtl"
      />


    <!-- Lang -->
    <script src="./assets/javascript/language-toggle.js"></script>
  </body>
</html>
